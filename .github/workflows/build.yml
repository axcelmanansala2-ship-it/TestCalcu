name: TestCalcu
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore keystore.jks \
            -alias testcalcu \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=TestCalcu, OU=Dev, O=TestCalcu, L=City, S=State, C=US" \
            -storepass testcalcu \
            -keypass testcalcu \
            -noprompt

      - name: Build APK
        run: gradle assembleRelease
        env:
          KEYSTORE_PASSWORD: testcalcu
          KEY_ALIAS: testcalcu
          KEY_PASSWORD: testcalcu

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
